# Stage 1 Separability Experiment Configuration
# TS-ZRV Causal Binding Check 可分性实验配置

# 模型配置 (使用 ModelScope 魔塔下载)
# 推荐新模型 (轻量级、下载快):
#   - qwen2.5-1.5b-instruct: 阿里云Qwen2.5, 1.5B参数, 效果优秀
#   - llama3.2-1b: Meta LLaMA 3.2, 1B参数, 最新架构
#   - gemma-2b: Google Gemma 2B, 轻量化
#   - phi3-mini: Microsoft Phi-3, 小模型强性能
model:
  name: "qwen2.5-1.5b-instruct"  # 默认使用Qwen2.5
  # ModelScope 模型 ID
  modelscope_id: "qwen/Qwen2.5-1.5B-Instruct"
  # 要测试的层索引 (Transformer layers)
  # Qwen2.5-1.5B有28层，测试不同位置
  target_layers: [7, 14, 21]
  # 隐藏层维度 (Qwen2.5-1.5B: 1536)
  hidden_dim: 1536
  # 最大序列长度
  max_length: 256

# 数据集配置 (使用 ModelScope 魔塔下载)
dataset:
  name: "wikitext"
  # ModelScope 数据集 ID
  modelscope_id: "AI-ModelScope/wikitext-2-raw-v1"
  subset: "train"
  # 采样数量
  num_samples: 2000
  # 序列长度列表
  seq_lengths: [128, 256]

# 攻击类型配置
attacks:
  # 随机噪声攻击 (Byzantine Failure)
  random_noise:
    enabled: true
    noise_levels: [0.1, 0.5, 1.0, 2.0, 5.0]  # 标准差 σ
    distribution: "gaussian"  # gaussian, uniform

  # 重放攻击 (Replay Attack)
  replay_attack:
    enabled: true
    replay_types:
      - "cross_sequence_same_layer"    # 不同序列，同层
      - "cross_sequence_cross_layer"   # 不同序列，不同层
      - "same_sequence_cross_layer"    # 同序列，不同层
    # 重放池大小
    replay_pool_size: 500

  # 其他攻击 (用于 Stage 2 测试，但这里也记录)
  layer_skipping:
    enabled: false  # Stage 1 无法检测，留给 Stage 2

  precision_downgrade:
    enabled: false  # Stage 1 无法检测，留给 Stage 2

# 实验参数
experiment:
  # 随机种子
  seed: 42
  # 批次大小
  batch_size: 16
  # 设备 (auto, cpu, cuda)
  device: "auto"
  # 输出目录
  output_dir: "./results"
  # 缓存目录
  cache_dir: "./data/cache"

# 分析参数
analysis:
  # 阈值搜索范围
  threshold_range: [0.0, 1.0]
  threshold_step: 0.01
  # 置信区间
  confidence_level: 0.95
  # 可视化设置
  plot_format: "png"
  plot_dpi: 300
