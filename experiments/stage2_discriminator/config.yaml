# Stage 2 Discriminator Experiment Configuration
# TS-ZRV Deep Integrity Check 判别器训练配置

# 模型配置（复用 Stage 1）
model:
  name: "qwen2.5-1.5b-instruct"
  modelscope_id: "qwen/Qwen2.5-1.5B-Instruct"
  target_layers: [21]         # 专注 layer_21
  hidden_dim: 1536
  max_length: 256

# 数据集配置（复用 Stage 1）
dataset:
  name: "alpaca"
  modelscope_id: "AI-ModelScope/alpaca-gpt4-data-en"
  subset: "train"
  num_samples: 8000           # 从 4000 扩大到 8000

# 判别器架构配置（仅 layer_21 优化）
discriminator:
  architectures:
    # --- 方向二：频域特征（FFT + GatedDual + Stat 三流融合）---
    - name: "fft_enhanced_s"
      type: "fft_enhanced"
      hidden_dim: 256
      dropout: 0.2
      proj_dim: 128
      n_fft_feats: 32

    - name: "fft_enhanced_m"
      type: "fft_enhanced"
      hidden_dim: 512
      dropout: 0.2
      proj_dim: 256
      n_fft_feats: 32

    # --- 方向三：特征归一化（用现有最佳架构 + z-score 归一化输入）---
    # 归一化通过 config.normalization 控制，架构与 v8 最佳相同
    - name: "gated_dual_s_norm"
      type: "gated_dual_stream"
      hidden_dim: 256
      dropout: 0.2

    - name: "stat_enhanced_m_norm"
      type: "stat_enhanced_gated"
      hidden_dim: 512
      dropout: 0.2
      proj_dim: 256

# 大型架构（--big 参数启用）
  big_architectures:
    - name: "stat_enhanced_l"
      type: "stat_enhanced_gated"
      hidden_dim: 1024
      dropout: 0.2
      proj_dim: 512
    - name: "gated_dual_l"
      type: "gated_dual_stream"
      hidden_dim: 1024
      dropout: 0.2

# 超大型架构（--huge 参数启用）
  huge_architectures:
    - name: "resnet_mlp"
      type: "resnet"
      hidden_dim: 4096
      num_blocks: 8
      dropout: 0.3

# Stage 2 攻击配置
attacks:
  layer_skipping:
    enabled: true

  precision_downgrade:
    enabled: true
    bit_widths: [6, 8, 4]     # 新增 INT6，覆盖更多量化强度梯度

  adversarial_perturbation:
    enabled: true
    methods: ["fgsm"]  # FGSM
    epsilon: [0.1, 0.5, 1.0]  # 扩大扰动范围，原为 [0.01, 0.05, 0.1]

# 训练配置
training:
  epochs: 80
  batch_size: 4096
  learning_rate: 8e-4
  weight_decay: 1e-4
  warmup_epochs: 5
  grad_clip: 1.0
  label_smoothing: 0.05       # 轻微 label smoothing，防止过拟合
  early_stopping_patience: 15
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
  device: "auto"
  class_weights: [1, 7]

# Per-layer 训练配置覆盖
per_layer_training:
  layer_21:
    loss: "supcon_ce"
    supcon_weight: 0.4
    supcon_temperature: 0.07
    epochs: 120
    early_stopping_patience: 25
    learning_rate: 5e-4
    label_smoothing: 0.05
    class_weights: [1, 5]

# 数据增强配置
augmentation:
  enabled: true
  layers: [21]
  noise_std: 0.005
  dropout_p: 0.03

# 特征归一化配置（方向三）
normalization:
  enabled: true
  layers: [21]              # layer_21 的 x_curr norm 远大于其他层，归一化后 delta 信号更突出

# 实验参数
experiment:
  seed: 42
  output_dir: "./results"
  cache_dir: "../stage1_separability/data/cache"  # 复用 Stage 1 的缓存
  sample_cache:
    enabled: true
    cache_dir: "../stage1_separability/data/sample_cache"
